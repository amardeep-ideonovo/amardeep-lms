# Render Blueprint — provisions the API + PostgreSQL + Redis and auto-deploys
# the API on every push to `main`. Connect via Render → New → Blueprint and
# point it at this repo. Plans marked "free" may need bumping to a paid tier
# depending on your Render account; the structure stays the same.

databases:
  - name: lms-db
    databaseName: lms
    plan: free

services:
  # Redis for BullMQ (Mailchimp sync queue). noeviction is required by BullMQ.
  - type: redis
    name: lms-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: [] # internal only

  - type: web
    name: lms-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true # redeploy on push to the connected branch (main)
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lms-redis
          property: connectionString
      - key: PORT
        value: "3000"
      # Surfaced in /health + Sentry; also gates the prod-only safety checks
      # (required JWT_SECRET, strict CORS) in apps/api.
      - key: ENV_NAME
        value: "production"
      # Behind Render's proxy — trust the first X-Forwarded-For hop so req.ip
      # is the real client (per-IP rate limiting). See apps/api/src/main.ts.
      - key: TRUST_PROXY
        value: "1"
      - key: JWT_SECRET
        generateValue: true # Render generates a random secret
      # 32-byte base64 key for at-rest encryption of Stripe/Mailchimp secrets.
      # Render's generateValue isn't base64-32, so set this manually (see steps).
      - key: SETTINGS_ENC_KEY
        sync: false
      # Member web app origin (Vercel URL) — Stripe redirects back here.
      - key: WEB_APP_URL
        sync: false
      # Comma-separated allowed origins (the Vercel admin + web URLs).
      - key: CORS_ORIGIN
        sync: false
      # Integration secrets — set in the Render dashboard (never committed).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MAILCHIMP_API_KEY
        sync: false
      - key: MAILCHIMP_SERVER_PREFIX
        sync: false
      - key: MAILCHIMP_AUDIENCE_ID
        sync: false
