name: BDD

# Gates merges into main: BDD scenarios must pass on every PR targeting main.
# Also runs on pushes to amardeepLMS for fast feedback while developing.
on:
  pull_request:
    branches: [main]
  push:
    branches: [amardeepLMS]

jobs:
  bdd:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lms
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      # CI-only test key (not a real secret). 32 bytes, base64.
      SETTINGS_ENC_KEY: /hPDRHx7skUjWVQVblkIExEjY1+Ldpk3TJGycbOKtmc=
      PORT: "3000"
      API_URL: http://localhost:3000
      # Sequential BDD scenarios share localhost as their source IP, so the
      # 5/min default throttle would trip after the 5th login attempt. Lift
      # the limit only for CI (real prod keeps the secure default).
      THROTTLE_LOGIN_LIMIT: "1000"
      THROTTLE_SIGNUP_LIMIT: "1000"
      THROTTLE_FORGOT_LIMIT: "1000"
      # The API is built and run from dist at the repo-root cwd (see "Start API"),
      # so the default process.cwd()/src/... media + cert paths resolve to
      # <root>/src/... and MISS the files the seed writes (apps/api/src/...). Pin
      # them to the source tree (absolute) so cert-artwork reads + font embedding
      # find the seeded/committed assets — otherwise certificate claims 409 on a
      # missing-artwork render.
      MEDIA_DIR: ${{ github.workspace }}/apps/api/src/media-uploads
      CERT_FONTS_DIR: ${{ github.workspace }}/apps/api/src/certificates/fonts
      CERT_FILES_DIR: ${{ github.workspace }}/apps/api/src/files/certificates
      # Dummy Stripe key (valid format, never used for real API calls) so the
      # payment-provider switch to "stripe" passes its "is Stripe configured?"
      # guard. Without it the @paypal-settings scenario AND its cleanup hook
      # (which switch the active provider back to stripe) 400.
      STRIPE_SECRET_KEY: sk_test_ci_dummy_key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema packages/db/prisma/schema.prisma

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - name: Seed database
        run: npm run -w @lms/db seed

      # Provisioning contract: SEED_ADMIN_* / SEED_DEMO_CONTENT must keep
      # producing the first admin the control plane discloses. Runs against
      # its own scratch database on the service postgres — the BDD database
      # seeded above is untouched.
      - name: Seed provisioning check
        run: npm run -w @lms/db test:seed

      - name: Build API
        run: npm run -w @lms/api build

      - name: Start API
        run: |
          node apps/api/dist/apps/api/src/main.js &
          echo $! > /tmp/api.pid

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/auth/login" \
              -H 'Content-Type: application/json' -d '{"email":"x","password":"y"}' || true)
            if [ "$code" != "000" ]; then echo "API responding ($code)"; exit 0; fi
            sleep 1
          done
          echo "API failed to start"; exit 1

      - name: Run BDD scenarios
        run: npm run -w @lms/bdd test

      - name: Stop API
        if: always()
        run: kill "$(cat /tmp/api.pid)" 2>/dev/null || true
