name: Deploy LMS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh "${{ secrets.USER }}@${{ secrets.HOST }}" << 'EOF'
            set -e

            cd /var/www/vhosts/websitedesignpixel.com/lms.websitedesignpixel.com

            git fetch origin
            git checkout main
            # Hand-edited tracked files on the server make `git pull` abort and
            # every deploy fail ~15s in (caused the May 29 → Jul 4 stale-deploy
            # outage). Server files are never the source of truth — discard drift.
            git checkout -- .
            git pull origin main

            set -a
            source .env
            set +a

            npm install
            npm run db:generate
            npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

            npm -w apps/web run build
            # Admin is served under /admin behind the reverse proxy. basePath must be
            # inlined at build time (NEXT_PUBLIC_* are baked into the bundle by next
            # build), so set it here rather than relying on the server .env — which has
            # proven unreliable (rebuilds kept emitting /_next, i.e. no prefix).
            NEXT_PUBLIC_ADMIN_BASE_PATH=/admin npm -w apps/admin run build
            npm -w apps/api run build

            # Runtime-only: the root .env is sourced before npm install, so
            # NODE_ENV=production cannot live there (it would prune devDeps and
            # break the builds above). Exported here, --update-env bakes it into
            # the pm2 processes.
            export NODE_ENV=production
            pm2 restart lms-web --update-env
            pm2 restart lms-admin --update-env
            pm2 restart lms-api --update-env
          EOF
