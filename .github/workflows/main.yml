name: Deploy LMS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh "${{ secrets.USER }}@${{ secrets.HOST }}" << 'EOF'
            set -e

            cd /var/www/vhosts/websitedesignpixel.com/lms.websitedesignpixel.com

            git fetch origin
            git checkout main
            # Discard any hand-edits made directly on the server: a dirty
            # checkout makes `git pull` abort, which silently blocked every
            # deploy from 2026-05-29 to 2026-07-04. The server checkout is
            # deploy-only; origin/main is the sole source of truth.
            git reset --hard origin/main
            git pull origin main

            set -a
            source .env
            set +a

            npm install
            npm run db:generate
            npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

            npm -w apps/web run build
            # Admin is served under /admin behind the reverse proxy. basePath must be
            # inlined at build time (NEXT_PUBLIC_* are baked into the bundle by next
            # build), so set it here rather than relying on the server .env — which has
            # proven unreliable (rebuilds kept emitting /_next, i.e. no prefix).
            NEXT_PUBLIC_ADMIN_BASE_PATH=/admin npm -w apps/admin run build
            npm -w apps/api run build

            # Exported after `source .env` (which may carry a development
            # value) and after the builds, so pm2 --update-env bakes
            # production into the running processes without starving
            # npm install of devDependencies.
            export NODE_ENV=production

            pm2 restart lms-web --update-env
            pm2 restart lms-admin --update-env
            pm2 restart lms-api --update-env
          EOF
